<!DOCTYPE html>
<html>
<head>
    <title>Test Chat Actions</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container mt-5">
        <h1>Test Chat Actions API</h1>
        
        <div class="mb-3">
            <label>Contact ID:</label>
            <input type="number" id="contactId" value="1" class="form-control">
        </div>
        
        <div class="mb-3">
            <button onclick="testMute()" class="btn btn-primary">Test Mute</button>
            <button onclick="testUnmute()" class="btn btn-secondary">Test Unmute</button>
            <button onclick="testClear()" class="btn btn-warning">Test Clear Chat</button>
            <button onclick="testBlock()" class="btn btn-danger">Test Block</button>
            <button onclick="testUnblock()" class="btn btn-info">Test Unblock</button>
        </div>
        
        <div id="result" class="mt-3"></div>
    </div>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        async function testMute() {
            const contactId = document.getElementById('contactId').value;
            try {
                const response = await fetch('/tickets/api/chat/mute/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({
                        contact_id: contactId
                    })
                });
                
                const data = await response.json();
                document.getElementById('result').innerHTML = `
                    <div class="alert alert-${response.ok ? 'success' : 'danger'}">
                        <strong>Mute Response:</strong><br>
                        Status: ${response.status}<br>
                        Data: ${JSON.stringify(data, null, 2)}
                    </div>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <div class="alert alert-danger">
                        <strong>Error:</strong> ${error.message}
                    </div>
                `;
            }
        }

        async function testUnmute() {
            const contactId = document.getElementById('contactId').value;
            try {
                const response = await fetch(`/tickets/api/chat/mute/?contact_id=${contactId}`, {
                    method: 'DELETE',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken')
                    }
                });
                
                const data = await response.json();
                document.getElementById('result').innerHTML = `
                    <div class="alert alert-${response.ok ? 'success' : 'danger'}">
                        <strong>Unmute Response:</strong><br>
                        Status: ${response.status}<br>
                        Data: ${JSON.stringify(data, null, 2)}
                    </div>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <div class="alert alert-danger">
                        <strong>Error:</strong> ${error.message}
                    </div>
                `;
            }
        }

        }
    </script>
</body>
</html>
